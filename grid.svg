      <path class="ln" pathLength="1" style="animation-delay:-10.8s" d="M228.007 257.659L228.007 237.159" stroke="#343434" stroke-width="1.90103"></path>
      <path class="ln" pathLength="1" style="animation-delay:-3.6s" d="M223.914 249.007C45.29 249.007 -301.412 431.357 -301.412 761.167" stroke="#343434" stroke-width="1.31661"></path>

      <!-- tiles stay static; crosses are driven by the lines that pass through them -->
      <rect width="26" height="26" transform="translate(1119 235)" fill="#1A1A1A"></rect>
      <path class="cross c2" pathLength="1" d="M1125 248.091L1139.5 248.091" stroke="#5E5E5D"></path>
      <path class="cross c2" pathLength="1" d="M1132.16 255.25L1132.16 240.75" stroke="#5E5E5D"></path>

      <rect width="26" height="26" transform="translate(1119 49)" fill="#1A1A1A"></rect>
