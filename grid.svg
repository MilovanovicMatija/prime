      <rect width="26" height="26" transform="translate(215 236)" fill="#1A1A1A"></rect>
      <path class="cross c5" pathLength="1" d="M221 249.091L235.5 249.091" stroke="#5E5E5D"></path>
      <path class="cross c5" pathLength="1" d="M228.156 256.25L228.156 241.75" stroke="#5E5E5D"></path>
    </g>

    <rect width="26" height="26" transform="translate(215 748)" fill="#1A1A1A"></rect>
    <path class="cross c6" pathLength="1" d="M221 761.091L235.5 761.091" stroke="#5E5E5D"></path>
    <path class="cross c6" pathLength="1" d="M228.156 768.25L228.156 753.75" stroke="#5E5E5D"></path>

    <rect width="26" height="26" transform="translate(1119 748)" fill="#1A1A1A"></rect>
    <path class="cross c3" pathLength="1" d="M1125 761.091L1139.5 761.091" stroke="#5E5E5D"></path>
    <path class="cross c3" pathLength="1" d="M1132.16 768.25L1132.16 753.75" stroke="#5E5E5D"></path>
  </g>

